<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poligonal Figures | Creador de Arte</title>
    <link rel="stylesheet" href="styles.css">  
</head>
<body>
    
    <!-- ENCABEZADO DE LA PÁGINA -->
    <header style="text-align: center; margin-bottom: 20px;">
        <h1>Poligonal Figures</h1>
        <p class="subtitulo">Crea, diseña e imprime tus figuras 3D y papel en segundos.</p>
    </header>

    <!-- ÁREA PRINCIPAL DE TRABAJO -->
    <main>
        <!-- 1. El Lienzo donde ocurrirá la magia -->
        <div id="area-dibujo" style="text-align: center; margin-bottom: 20px;">
            <canvas id="lienzo" width="600" height="400" style="border: 1px solid #1e293b; background-color: #0f172a; display: inline-block;"></canvas>
        </div>

        <!-- 3. GALERÍA DE DISEÑOS PRECARGADOS (Modelos Escultóricos Detallados de Alta Gama) -->
        <div id="seccion-catatogo" style="margin: 35px 0; text-align: center;">
            <h3 style="color: #64748b; font-family: 'Segoe UI', sans-serif; font-size: 0.85rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 25px;">
                📐 COLECCIÓN ESCULTURAS COMANCHET: ESTUDIO DE ARTE
            </h3>
            
            <div class="galeria-cuadricula" style="display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;">
                
                <!-- Modelo 1: Toro de Wall Street (Malla Completa) -->
                <div class="tarjeta-diseno" data-img="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 150' style='background:%230f172a;'><polygon points='30,80 55,65 70,85 45,95' fill='%233a4a61' stroke='%235c708c' stroke-width='0.5'/><polygon points='55,65 50,35 40,45' fill='%2364748b' stroke='%2394a3b8' stroke-width='0.5'/><polygon points='55,65 100,50 120,85 70,85' fill='%2327354a' stroke='%233b4f6e' stroke-width='0.5'/><polygon points='100,50 155,55 170,90 120,85' fill='%231e293b' stroke='%23334155' stroke-width='0.5'/><polygon points='70,85 120,85 145,110 85,110' fill='%23141d2e' stroke='%2324334f' stroke-width='0.5'/><polygon points='45,95 70,85 85,110 75,135 60,135' fill='%231c2636' stroke='%232e3f59' stroke-width='0.5'/><polygon points='155,55 170,90 160,135 145,135 145,110' fill='%23222e44' stroke='%23364968' stroke-width='0.5'/><polygon points='170,90 185,85 180,105' fill='%230f172a' stroke='%231e293b' stroke-width='0.5'/></svg>" style="border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; background: rgba(15, 23, 42, 0.4); cursor: pointer; text-align: center; width: 150px; transition: all 0.3s;">
                    <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 150' style='background:%231e293b; border-radius:6px;'><polygon points='30,80 55,65 70,85 45,95' fill='%233a4a61' stroke='%235c708c' stroke-width='0.5'/><polygon points='55,65 50,35 40,45' fill='%2364748b' stroke='%2394a3b8' stroke-width='0.5'/><polygon points='55,65 100,50 120,85 70,85' fill='%2327354a' stroke='%233b4f6e' stroke-width='0.5'/><polygon points='100,50 155,55 170,90 120,85' fill='%231e293b' stroke='%23334155' stroke-width='0.5'/><polygon points='70,85 120,85 145,110 85,110' fill='%23141d2e' stroke='%2324334f' stroke-width='0.5'/><polygon points='45,95 70,85 85,110 75,135 60,135' fill='%231c2636' stroke='%232e3f59' stroke-width='0.5'/><polygon points='155,55 170,90 160,135 145,135 145,110' fill='%23222e44' stroke='%23364968' stroke-width='0.5'/></svg>" alt="Toro Geométrico" style="width: 100%; border-radius: 6px; height: 110px; object-fit: cover;">
                    <p style="color: #94a3b8; margin: 10px 0 0 0; font-size: 0.8rem; font-family: inherit; font-weight: 500; letter-spacing: 1px; text-transform: uppercase;">Toro de Wall Street</p>
                </div>

                <!-- Modelo 2: Elefante Imperial (Malla Completa) -->
                <div class="tarjeta-diseno" data-img="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 150' style='background:%230f172a;'><polygon points='60,65 90,55 85,95 55,90' fill='%23334155' stroke='%23475569' stroke-width='0.5'/><polygon points='40,70 60,65 55,90 35,90' fill='%23475569' stroke='%2364748b' stroke-width='0.5'/><polygon points='35,90 20,70 25,60 40,70' fill='%231e293b' stroke='%23334155' stroke-width='0.5'/><polygon points='25,60 22,40 32,42 28,60' fill='%232d3748' stroke='%234a5568' stroke-width='0.5'/><polygon points='90,55 145,50 170,90 125,105 85,95' fill='%231e293b' stroke='%232d3748' stroke-width='0.5'/><polygon points='55,90 85,95 80,135 65,135' fill='%23141a24' stroke='%23232d3f' stroke-width='0.5'/><polygon points='125,105 170,90 160,135 145,135' fill='%232d3748' stroke='%234a5568' stroke-width='0.5'/></svg>" style="border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; background: rgba(15, 23, 42, 0.4); cursor: pointer; text-align: center; width: 150px; transition: all 0.3s;">
                    <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 150' style='background:%231e293b; border-radius:6px;'><polygon points='60,65 90,55 85,95 55,90' fill='%23334155' stroke='%23475569' stroke-width='0.5'/><polygon points='40,70 60,65 55,90 35,90' fill='%23475569' stroke='%2364748b' stroke-width='0.5'/><polygon points='35,90 20,70 25,60 40,70' fill='%231e293b' stroke='%23334155' stroke-width='0.5'/><polygon points='25,60 22,40 32,42 28,60' fill='%232d3748' stroke='%234a5568' stroke-width='0.5'/><polygon points='90,55 145,50 170,90 125,105 85,95' fill='%231e293b' stroke='%232d3748' stroke-width='0.5'/><polygon points='55,90 85,95 80,135 65,135' fill='%23141a24' stroke='%23232d3f' stroke-width='0.5'/><polygon points='125,105 170,90 160,135 145,135' fill='%232d3748' stroke='%234a5568' stroke-width='0.5'/></svg>" alt="Elefante Geométrico" style="width: 100%; border-radius: 6px; height: 110px; object-fit: cover;">
                    <p style="color: #94a3b8; margin: 10px 0 0 0; font-size: 0.8rem; font-family: inherit; font-weight: 500; letter-spacing: 1px; text-transform: uppercase;">Elefante Imperial</p>
                </div>

                <!-- Modelo 3: Rinoceronte Negro (Malla Completa) -->
                <div class="tarjeta-diseno" data-img="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 150' style='background:%230f172a;'><polygon points='50,90 85,65 105,85 70,110' fill='%23242e42' stroke='%233b4b6b' stroke-width='0.5'/><polygon points='50,90 35,60 55,75' fill='%234f5e78' stroke='%23768ba8' stroke-width='0.5'/><polygon points='55,75 48,63 60,70' fill='%23334155' stroke='%23475569' stroke-width='0.5'/><polygon points='85,65 145,60 175,90 105,85' fill='%231a2333' stroke='%232a374f' stroke-width='0.5'/><polygon points='105,85 175,90 155,115 110,115' fill='%23101724' stroke='%231f2b42' stroke-width='0.5'/><polygon points='55,100 70,110 65,135 50,135' fill='%23141c29' stroke='%2325324a' stroke-width='0.5'/><polygon points='145,95 175,90 165,135 150,135' fill='%23222d42' stroke='%23384a6b' stroke-width='0.5'/></svg>" style="border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; background: rgba(15, 23, 42, 0.4); cursor: pointer; text-align: center; width: 150px; transition: all 0.3s;">
                    <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 150' style='background:%231e293b; border-radius:6px;'><polygon points='50,90 85,65 105,85 70,110' fill='%23242e42' stroke='%233b4b6b' stroke-width='0.5'/><polygon points='50,90 35,60 55,75' fill='%234f5e78' stroke='%23768ba8' stroke-width='0.5'/><polygon points='55,75 48,63 60,70' fill='%23334155' stroke='%23475569' stroke-width='0.5'/><polygon points='85,65 145,60 175,90 105,85' fill='%231a2333' stroke='%232a374f' stroke-width='0.5'/><polygon points='105,85 175,90 155,115 110,115' fill='%23101724' stroke='%231f2b42' stroke-width='0.5'/><polygon points='55,100 70,110 65,135 50,135' fill='%23141c29' stroke='%2325324a' stroke-width='0.5'/><polygon points='145,95 175,90 165,135 150,135' fill='%23222d42' stroke='%23384a6b' stroke-width='0.5'/></svg>" alt="Rinoceronte Geométrico" style="width: 100%; border-radius: 6px; height: 110px; object-fit: cover;">
                    <p style="color: #94a3b8; margin: 10px 0 0 0; font-size: 0.8rem; font-family: inherit; font-weight: 500; letter-spacing: 1px; text-transform: uppercase;">Rinoceronte Negro</p>
                </div>

                <!-- Modelo 4: Pantera Sigilosa (Malla Completa) -->
                <div class="tarjeta-diseno" data-img="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 150' style='background:%230f172a;'><polygon points='30,85 50,75 60,85 45,100' fill='%231e2530' stroke='%23333f52' stroke-width='0.5'/><polygon points='50,75 45,68 55,72' fill='%23333f52' stroke='%234f617d' stroke-width='0.5'/><polygon points='50,75 105,70 135,85 60,85' fill='%23151b24' stroke='%23242e3d' stroke-width='0.5'/><polygon points='105,70 165,75 175,95 135,85' fill='%0e121a' stroke='%231c2430' stroke-width='0.5'/><polygon points='45,100 60,85 70,125 55,125' fill='%2311161f' stroke='%23222b3d' stroke-width='0.5'/><polygon points='135,85 175,95 165,125 150,125' fill='%231c2533' stroke='%23314057' stroke-width='0.5'/><polygon points='165,75 190,95 185,100 175,95' fill='%230a0d14' stroke='%23141b26' stroke-width='0.5'/></svg>" style="border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; background: rgba(15, 23, 42, 0.4); cursor: pointer; text-align: center; width: 150px; transition: all 0.3s;">
                    <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 150' style='background:%231e293b; border-radius:6px;'><polygon points='30,85 50,75 60,85 45,100' fill='%231e2530' stroke='%23333f52' stroke-width='0.5'/><polygon points='50,75 45,68 55,72' fill='%23333f52' stroke='%234f617d' stroke-width='0.5'/><polygon points='50,75 105,70 135,85 60,85' fill='%23151b24' stroke='%23242e3d' stroke-width='0.5'/><polygon points='105,70 165,75 175,95 135,85' fill='%0e121a' stroke='%231c2430' stroke-width='0.5'/><polygon points='45,100 60,85 70,125 55,125' fill='%2311161f' stroke='%23222b3d' stroke-width='0.5'/><polygon points='135,85 175,95 165,125 150,125' fill='%231c2533' stroke='%23314057' stroke-width='0.5'/><polygon points='165,75 190,95 185,100 175,95' fill='%230a0d14' stroke='%23141b26' stroke-width='0.5'/></svg>" alt="Pantera Geométrica" style="width: 100%; border-radius: 6px; height: 110px; object-fit: cover;">
                    <p style="color: #94a3b8; margin: 10px 0 0 0; font-size: 0.8rem; font-family: inherit; font-weight: 500; letter-spacing: 1px; text-transform: uppercase;">Pantera Sigilosa</p>
                </div>

            </div>
        </div>

        <!-- 2. Los Botones de control (Un solo set único) -->
        <div id="panel-controles" style="text-align: center; margin-top: 20px;">
            <select id="selector-plantilla">
                <option value="ninguna">✨ Lienzo en Blanco</option>
                <option value="corazon">❤️ Plantilla: Corazón</option>
                <option value="diamante">💎 Plantilla: Diamante</option>
            </select>

            <button id="btn-color">🎨 Cambiar Paleta de Color</button>
            <button id="btn-exportar">📥 Comprar y Descargar Archivo</button>
        </div>
    </main>

    <!-- CONEXIÓN CON EL SCRIPT ÚNICO -->
    <script src="script.js"></script>
</body>
</html>
