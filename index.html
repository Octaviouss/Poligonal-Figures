<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poligonal Figures | Creador de Arte</title>
    
    <style>
        /* ==========================================
           ESTILOS PREMIUM: ESTUDIO DE POLÍGONOS 3D
           ========================================== */

        /* 1. Base del Sitio (Estilo Galería de Lujo) */
        body {
            background-color: #090d16; /* Negro azulado profundo */
            color: #f1f5f9;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Encabezados elegantes y estilizados */
        h1, h2, h3 {
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
        }

        h1 {
            color: #ffffff;
            font-size: 2.2rem;
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        p.subtitulo {
            color: #64748b;
            font-size: 0.95rem;
            margin-top: 0;
            margin-bottom: 30px;
            text-align: center;
        }

        /* 2. Área de Trabajo Principal */
        main {
            max-width: 900px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        /* Contenedor del Lienzo con sombra de estudio */
        #area-dibujo {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            border: 1px solid #1e293b;
            background: #0f172a;
        }

        canvas#lienzo {
            display: block;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        /* 3. Catálogo de Siluetas Interactivas (Estilo Tienda de Arte) */
        #seccion-catatogo {
            width: 100%;
        }

        #seccion-catatogo h3 {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 15px;
        }

        .galeria-cuadricula {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Tarjetas de Producto estilo Glassmorphism */
        .tarjeta-diseno {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 12px;
            width: 160px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        .tarjeta-diseno:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            background: rgba(30, 41, 59, 0.7);
        }

        .tarjeta-diseno img {
            width: 100%;
            height: 110px;
            object-fit: cover;
            border-radius: 8px;
            filter: brightness(0.9);
            transition: filter 0.3s ease;
        }

        .tarjeta-diseno:hover img {
            filter: brightness(1.1);
        }

        .tarjeta-diseno p {
            color: #cbd5e1;
            margin: 10px 0 0 0;
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        /* 4. Panel de Controles e Inputs */
        #panel-controles {
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            width: 100%;
            margin-top: 10px;
        }

        /* Contenedor estilizado para el input file */
        .input-subir-personalizado {
            position: relative;
            display: inline-block;
        }

        .input-subir-personalizado input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .btn-subir-estilo {
            background-color: #1e293b;
            color: #ffffff;
            border: 1px solid #334155;
            display: inline-block;
        }

        .btn-subir-estilo:hover {
            background-color: #334155;
            border-color: #475569;
        }

        /* Controles deslizantes (Sliders) */
        .control-slider {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(15, 23, 42, 0.6);
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #1e293b;
            font-size: 0.85rem;
            color: #cbd5e1;
        }

        .control-slider input[type="range"] {
            cursor: pointer;
            accent-color: #a38965;
        }

        /* Botonera de Acción de Alta Gama */
        button {
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Botón Descargar: El Call to Action de Compra */
        #btn-exportar {
            background: linear-gradient(135deg, #8a7355 0%, #5c4d38 100%); /* Bronce / Carbón Premium */
            color: #ffffff;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        /* Estado: Pasar el mouse */
        #btn-exportar:hover {
            transform: scale(1.02);
            background: linear-gradient(135deg, #a38965 0%, #6e5b43 100%);
            box-shadow: 0 6px 25px rgba(138, 115, 85, 0.2);
        }

        /* Estado: Hacer clic */
        #btn-exportar:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    
    <!-- ENCABEZADO DE LA PÁGINA -->
    <header>
        <h1>Poligonal Figures</h1>
        <p class="subtitulo">Crea, diseña e imprime tus figuras 3D y papel en segundos.</p>
    </header>

    <!-- ÁREA PRINCIPAL DE TRABAJO -->
    <main>
        <!-- 1. El Lienzo donde ocurrirá la magia -->
        <div id="area-dibujo">
            <canvas id="lienzo" width="600" height="400"></canvas>
        </div>

        <!-- 2. PANEL DE CONTROLES -->
        <div id="panel-controles">
            <div class="input-subir-personalizado">
                <button class="btn-subir-estilo">📷 Subir mi propia imagen</button>
                <input type="file" id="subir-imagen" accept="image/*">
            </div>

            <div class="control-slider">
                <label for="slider-puntos">Densidad:</label>
                <input type="range" id="slider-puntos" min="300" max="3000" step="100" value="1200">
                <span id="valor-puntos">1200 pts</span>
            </div>

            <button id="btn-exportar">Descargar PNG</button>
        </div>

        <!-- 3. GALERÍA DE DISEÑOS PRECARGADOS -->
        <div id="seccion-catatogo">
            <h3>📐 COLECCIÓN ESCULTURAS COMANCHET: ESTUDIO DE ARTE</h3>
            
            <div class="galeria-cuadricula">
                <div class="tarjeta-diseno" id="tarjeta-gato">
                    <img src="https://unsplash.com" alt="Gato">
                    <p>Gato de Estudio</p>
                </div>
            </div>
        </div>
    </main>

    <!-- INCLUSIÓN DE LIBRERÍA EXTERNA PARA POLÍGONOS -->
    <script src="https://cloudflare.com"></script>

    <!-- MOTOR DE CÓDIGO JAVASCRIPT AUTOMÁTICO -->
    <script>
        const canvas = document.getElementById('lienzo');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        const inputSubir = document.getElementById('subir-imagen'); 
        const areaDibujo = document.getElementById('area-dibujo');   
        const sliderPuntos = document.getElementById('slider-puntos');
        const valorPuntos = document.getElementById('valor-puntos');
        const btnExportar = document.getElementById('btn-exportar');
        const tarjetaGato = document.getElementById('tarjeta-gato');

        let imagenOriginal = null; 

        // Inicializar la ventana con un retraso corto para asegurar dimensiones estables
        function inicializarVentana() {
            ctx.fillStyle = "#0f172a";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ffffff";
            ctx.font = "300 16px 'Segoe UI', sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("ARRASTRA TU FOTOGRAFÍA AQUÍ O HAZ CLIC PARA EMPEZAR", canvas.width / 2, canvas.height / 2 - 10);
            
            ctx.fillStyle = "#64748b";
            ctx.font = "13px 'Segoe UI', sans-serif";
            ctx.fillText("Formatos admitidos: JPG, PNG y WebP", canvas.width / 2, canvas.height / 2 + 15);
        }
        setTimeout(inicializarVentana, 100);

        // Procesar archivos binarios de imágenes
        function procesarArchivo(archivo) {
           if (!archivo || !archivo.type.startsWith('image/')) {
                alert("Por favor, sube un archivo de imagen válido.");
                return;
            }

            const lector = new FileReader();
            lector.onload = function(evento) {
                imagenOriginal = new Image();
                imagenOriginal.onload = function() {
                    const maxAncho = 600;
                    const proporcion = imagenOriginal.height / imagenOriginal.width;
                    canvas.width = maxAncho;
                    canvas.height = maxAncho * proporcion;

                    generarLowPolyAutomatico();
                };
                imagenOriginal.src = evento.target.result;
            };
            lector.readAsDataURL(archivo);
        }

        // Motor de transformación matemática a Low Poly inteligente
        function generarLowPolyAutomatico() {
            if (!imagenOriginal) return;

            const ancho = canvas.width;
            const alto = canvas.height;
            const maxPuntos = parseInt(sliderPuntos.value) || 1200;

            const canvasOculto = document.createElement('canvas');
            canvasOculto.width = ancho;
            canvasOculto.height = alto;
            const ctxOculto = canvasOculto.getContext('2d');
            ctxOculto.drawImage(imagenOriginal, 0, 0, ancho, alto);
            const datosImagen = ctxOculto.getImageData(0, 0, ancho, alto);

            const puntos = [];
            
            // Anclajes de bordes y esquinas estructurales
            puntos.push([0, 0], [ancho, 0], [0, alto], [ancho, alto]);
            for (let x = 0; x <= ancho; x += 50) { puntos.push([x, 0]); puntos.push([x, alto]); }
            for (let y = 0; y <= alto; y += 50) { puntos.push([0, y]); puntos.push([ancho, y]); }

            // Algoritmo adaptativo basado en contraste (concentra puntos en áreas con detalles)
            let puntosGenerados = 0;
            let intentos = 0;
            
            while (puntosGenerados < maxPuntos && intentos < maxPuntos * 10) {
                intentos++;
                const rx = Math.floor(Math.random() * (ancho - 2)) + 1;
                const ry = Math.floor(Math.random() * (alto - 2)) + 1;
                
                const i = (ry * ancho + rx) * 4;
                const iDerecha = (ry * ancho + (rx + 1)) * 4;
                const iAbajo = ((ry + 1) * ancho + rx) * 4;
                
                const brilloActual = (datosImagen.data[i] + datosImagen.data[i+1] + datosImagen.data[i+2]) / 3;
                const brilloDerecha = (datosImagen.data[iDerecha] + datosImagen.data[iDerecha+1] + datosImagen.data[iDerecha+2]) / 3;
                const brilloAbajo = (datosImagen.data[iAbajo] + datosImagen.data[iAbajo+1] + datosImagen.data[iAbajo+2]) / 3;
                
                const diferencia = Math.abs(brilloActual - brilloDerecha) + Math.abs(brilloActual - brilloAbajo);
                
                if (diferencia > 22 || Math.random() < 0.04) {
                    puntos.push([rx, ry]);
                    puntosGenerados++;
                }
            }

            const delaunay = d3.Delaunay.from(puntos);
            const triangulosMalla = delaunay.trianglePolygons();

            ctx.clearRect(0, 0, ancho, alto);

            for (const triangulo of triangulosMalla) {
                ctx.beginPath();
                ctx.moveTo(triangulo[0][0], triangulo[0][1]);
                ctx.lineTo(triangulo[1][0], triangulo[1][1]);
                ctx.lineTo(triangulo[2][0], triangulo[2][1]);
                ctx.closePath();

                const centroX = Math.floor((triangulo[0][0] + triangulo[1][0] + triangulo[2][0]) / 3);
                const centroY = Math.floor((triangulo[0][1] + triangulo[1][1] + triangulo[2][1]) / 3);

                if (centroX >= 0 && centroX < ancho && centroY >= 0 && centroY < alto) {
                    const indicePixel = (centroY * ancho + centroX) * 4;
                    const r = datosImagen.data[indicePixel];
                    const g = datosImagen.data[indicePixel + 1];
                    const b = datosImagen.data[indicePixel + 2];

                    ctx.fillStyle = `rgb(${r || 0}, ${g || 0}, ${b || 0})`;
                    ctx.fill();

                    ctx.strokeStyle = ctx.fillStyle;
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                }
            }
        }

        // Configuración de interfaz Drag and Drop (Arrastrar y Soltar)
        if (areaDibujo) {
            ['dragenter', 'dragover'].forEach(evt => {
                areaDibujo.addEventListener(evt, (e) => {
                    e.preventDefault();
                    areaDibujo.style.borderColor = "#a38965";
                    canvas.style.opacity = "0.6";
                });
            });

            ['dragleave', 'drop'].forEach(evt => {
                areaDibujo.addEventListener(evt, (e) => {
                    e.preventDefault();
                    areaDibujo.style.borderColor = "#1e293b";
                    canvas.style.opacity = "1";
                });
            });

            areaDibujo.addEventListener('drop', (e) => {
                e.preventDefault();
                if (e.dataTransfer.files.length > 0) {
                    procesarArchivo(e.dataTransfer.files[0]);
                }
            });
            
            // Permitir abrir explorador haciendo clic directo en el área del lienzo vacío
            areaDibujo.addEventListener('click', (e) => {
                if (!imagenOriginal && e.target === canvas) {
                    inputSubir.click();
                }
            });
        }

        inputSubir.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                procesarArchivo(e.target.files[0]);
            }
        });

        sliderPuntos.addEventListener('input', function() {
            if (valorPuntos) valorPuntos.textContent = `${this.value} pts`;
            if (imagenOriginal) generarLowPolyAutomatico();
        });

        btnExportar.addEventListener('click', function() {
            if (!imagenOriginal) {
                alert("Primero debes procesar una imagen para poder exportarla.");
                return;
            }
            const enlace = document.createElement('a');
            enlace.download = 'mi-patron-lowpoly.png';
            enlace.href = canvas.toDataURL('image/png');
            enlace.click();
        });

        tarjetaGato.addEventListener('click', function() {
            imagenOriginal = new Image();
            imagenOriginal.crossOrigin = "anonymous";
            imagenOriginal.onload = function() {
                canvas.width = 600;
                canvas.height = 400;
                generarLowPolyAutomatico();
            };
            imagenOriginal.src = "https://unsplash.com";
        });
    </script>
</body>
</html>
