<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poligonal Figures | Creador de Arte</title>
    
    <style>
        /* ==========================================
           ESTILOS PREMIUM: ESTUDIO DE POLÍGONOS 3D
           ========================================== */

        /* 1. Base del Sitio (Estilo Galería de Lujo) */
        body {
            background-color: #090d16; /* Negro azulado profundo */
            color: #f1f5f9;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Encabezados elegantes y estilizados */
        h1, h2, h3 {
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
        }

        h1 {
            color: #ffffff;
            font-size: 2.2rem;
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        p.subtitulo {
            color: #64748b;
            font-size: 0.95rem;
            margin-top: 0;
            margin-bottom: 30px;
            text-align: center;
        }

        /* 2. Área de Trabajo Principal */
        main {
            max-width: 900px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        /* Contenedor del Lienzo con sombra de estudio */
        #area-dibujo {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            border: 1px solid #1e293b;
            background: #0f172a;
        }

        canvas#lienzo {
            display: block;
            cursor: crosshair;
            transition: opacity 0.3s ease;
        }

        /* 3. Catálogo de Siluetas Interactivas (Estilo Tienda de Arte) */
        #seccion-catatogo {
            width: 100%;
        }

        #seccion-catatogo h3 {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 15px;
        }

        .galeria-cuadricula {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Tarjetas de Producto estilo Glassmorphism */
        .tarjeta-diseno {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 12px;
            width: 160px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        .tarjeta-diseno:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            background: rgba(30, 41, 59, 0.7);
        }

        .tarjeta-diseno img {
            width: 100%;
            height: 110px;
            object-fit: cover;
            border-radius: 8px;
            filter: brightness(0.9);
            transition: filter 0.3s ease;
        }

        .tarjeta-diseno:hover img {
            filter: brightness(1.1);
        }

        .tarjeta-diseno p {
            color: #cbd5e1;
            margin: 10px 0 0 0;
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        /* 4. Panel de Controles e Inputs */
        #panel-controles {
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            width: 100%;
            margin-top: 10px;
        }

        /* El Selector Dropdown */
        #selector-plantilla {
            background-color: #0f172a;
            color: #f1f5f9;
            border: 1px solid #334155;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        #selector-plantilla:focus {
            border-color: #64748b;
        }

        /* Botonera de Acción de Alta Gama */
        button {
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Botón Cambiar Paleta: Minimalista e Industrial */
        #btn-color {
            background-color: transparent;
            color: #e2e8f0;
            border: 1px solid #475569;
        }

        #btn-color:hover {
            background-color: #1e293b;
            border-color: #94a3b8;
            color: #ffffff;
        }

        /* Botón Descargar: El Call to Action de Compra */
        #btn-exportar {
            background: linear-gradient(135deg, #8a7355 0%, #5c4d38 100%); /* Bronce / Carbón Premium */
            color: #ffffff;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        /* Estado: Pasar el mouse */
        #btn-exportar:hover {
            transform: scale(1.02);
            background: linear-gradient(135deg, #a38965 0%, #6e5b43 100%);
            box-shadow: 0 6px 25px rgba(138, 115, 85, 0.2);
        }

        /* Estado: Hacer clic */
        #btn-exportar:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    
    <!-- ENCABEZADO DE LA PÁGINA -->
    <header>
        <h1>Poligonal Figures</h1>
        <p class="subtitulo">Crea, diseña e imprime tus figuras 3D y papel en segundos.</p>
    </header>

    <!-- ÁREA PRINCIPAL DE TRABAJO -->
    <main>
        <!-- 1. El Lienzo donde ocurrirá la magia -->
        <div id="area-dibujo">
            <canvas id="lienzo" width="600" height="400"></canvas>
        </div>

        <!-- 3. GALERÍA DE DISEÑOS PRECARGADOS -->
        <div id="seccion-catatogo">
            <h3>📐 COLECCIÓN ESCULTURAS COMANCHET: ESTUDIO DE ARTE</h3>
            
            <div class="galeria-cuadricula">
                
                <!-- Modelo 1: Toro de Wall Street -->

                    <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 150' style='background:%231e293b; border-radius:6px;'><polygon points='30,80 55,65 70,85 45,95' fill='%233a4a61' stroke='%235c708c' stroke-width='0.5'/><polygon points='55,65 50,35 40,45' fill='%2364748b' stroke='%2394a3b8' stroke-width='0.5'/><polygon points='55,65 100,50 120,85 70,85' fill='%2327354a' stroke='%233b4f6e' stroke-width='0.5'/><polygon points='100,50 155,55 170,90 120,85' fill='%231e293b' stroke='%23334155' stroke-width='0.5'/><polygon points='70,85 120,85 145,110 85,110' fill='%23141d2e' stroke='%2324334f' stroke-width='0.5'/><polygon points='45,95 70,85 85,110 75,135 60,135' fill='%231c2636' stroke='%232e3f59' stroke-width='0.5'/><polygon points='155,55 170,90 160,135 145,135 145,110' fill='%23222e44' stroke='%23364968' stroke-width='0.5'/></svg>" alt="Toro Geométrico">
                    <p>Toro de Wall Street</p>
                </div>

                <!-- Modelo 2: Elefante Imperial -->
                <div class="tarjeta-diseno" data-img="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 150' style='background:%230f172a;'><polygon points='60,65 90,55 85,95 55,90' fill='%23334155' stroke='%23475569' stroke-width='0.5'/><polygon points='40,70 60,65 55,90 35,90' fill='%23475569' stroke='%2364748b' stroke-width='0.5'/><polygon points='35,90 20,70 25,60 40,70' fill='%231e293b' stroke='%23334155' stroke-width='0.5'/><polygon points='25,60 22,40 32,42 28,60' fill='%232d3748' stroke='%234a5568' stroke-width='0.5'/><polygon points='90,55 145,50 170,90 125,105 85,95' fill='%231e293b' stroke='%232d3748' stroke-width='0.5'/><polygon points='55,90 85,95 80,135 65,135' fill='%23141a24' stroke='%23232d3f' stroke-width='0.5'/><polygon points='125,105 170,90 160,135 145,135' fill='%232d3748' stroke='%234a5568' stroke-width='0.5'/></svg>">
                    <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 150' style='background:%231e293b; border-radius:6px;'><polygon points='60,65 90,55 85,95 55,90' fill='%23334155' stroke='%23475569' stroke-width='0.5'/><polygon points='40,70 60,65 55,90 35,90' fill='%23475569' stroke='%2364748b' stroke-width='0.5'/><polygon points='35,90 20,70 25,60 40,70' fill='%231e293b' stroke='%23334155' stroke-width='0.5'/><polygon points='25,60 22,40 32,42 28,60' fill='%232d3748' stroke='%234a5568' stroke-width='0.5'/><polygon points='90,55 145,50 170,90 125,105 85,95' fill='%231e293b' stroke='%232d3748' stroke-width='0.5'/><polygon points='55,90 85,95 80,135 65,135' fill='%23141a24' stroke='%23232d3f' stroke-width='0.5'/><polygon points='125,105 170,90 160,135 145,135' fill='%232d3748' stroke='%234a5568' stroke-width='0.5'/></svg>" alt="Elefante Geométrico">
                    <p>Elefante Imperial</p>
                </div>

                <!-- Modelo 3: Rinoceronte Negro -->
                <div class="tarjeta-diseno" data-img="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 150' style='background:%230f172a;'><polygon points='50,90 85,65 105,85 70,110' fill='%23242e42' stroke='%233b4b6b' stroke-width='0.5'/><polygon points='50,90 35,60 55,75' fill='%234f5e78' stroke='%23768ba8' stroke-width='0.5'/><polygon points='55,75 48,63 60,70' fill='%23334155' stroke='%23475569' stroke-width='0.5'/><polygon points='85,65 145,60 175,90 105,85' fill='%231a2333' stroke='%232a374f' stroke-width='0.5'/><polygon points='105,85 175,90 155,115 110,115' fill='%23101724' stroke='%231f2b42' stroke-width='0.5'/><polygon points='55,100 70,110 65,135 50,135' fill='%23141c29' stroke='%2325324a' stroke-width='0.5'/><polygon points='145,95 175,90 165,135 150,135' fill='%23222d42' stroke='%23384a6b' stroke-width='0.5'/></svg>">
                    <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 150' style='background:%231e293b; border-radius:6px;'><polygon points='50,90 85,65 105,85 70,110' fill='%23242e42' stroke='%233b4b6b' stroke-width='0.5'/><polygon points='50,90 35,60 55,75' fill='%234f5e78' stroke='%23768ba8' stroke-width='0.5'/><polygon points='55,75 48,63 60,70' fill='%23334155' stroke='%23475569' stroke-width='0.5'/><polygon points='85,65 145,60 175,90 105,85' fill='%231a2333' stroke='%232a374f' stroke-width='0.5'/><polygon points='105,85 175,90 155,115 110,115' fill='%23101724' stroke='%231f2b42' stroke-width='0.5'/><polygon points='55,100 70,110 65,135 50,135' fill='%23141c29' stroke='%2325324a' stroke-width='0.5'/><polygon points='145,95 175,90 165,135 150,135' fill='%23222d42' stroke='%23384a6b' stroke-width='0.5'/></svg>" alt="Rinoceronte Geométrico">
                    <p>Rinoceronte Negro</p>
                </div>

                <!-- Modelo 4: Pantera Sigilosa -->
                <div class="tarjeta-diseno" data-img="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 150' style='background:%230f172a;'><polygon points='30,85 50,75 60,85 45,100' fill='%231e2530' stroke='%23333f52' stroke-width='0.5'/><polygon points='50,75 45,68 55,72' fill='%23333f52' stroke='%234f617d' stroke-width='0.5'/><polygon points='50,75 105,70 135,85 60,85' fill='%23151b24' stroke='%23242e3d' stroke-width='0.5'/><polygon points='105,70 165,75 175,95 135,85' fill='%0e121a' stroke='%231c2430' stroke-width='0.5'/><polygon points='45,100 60,85 70,125 55,125' fill='%2311161f' stroke='%23222b3d' stroke-width='0.5'/><polygon points='135,85 175,95 165,125 150,125' fill='%231c2533' stroke='%23314057' stroke-width='0.5'/><polygon points='165,75 190,95 185,100 175,95' fill='%230a0d14' stroke='%23141b26' stroke-width='0.5'/></svg>">
                    <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 150' style='background:%231e293b; border-radius:6px;'><polygon points='30,85 50,75 60,85 45,100' fill='%231e2530' stroke='%23333f52' stroke-width='0.5'/><polygon points='50,75 45,68 55,72' fill='%23333f52' stroke='%234f617d' stroke-width='0.5'/><polygon points='50,75 105,70 135,85 60,85' fill='%23151b24' stroke='%23242e3d' stroke-width='0.5'/><polygon points='105,70 165,75 175,95 135,85' fill='%0e121a' stroke='%231c2430' stroke-width='0.5'/><polygon points='45,100 60,85 70,125 55,125' fill='%2311161f' stroke='%23222b3d' stroke-width='0.5'/><polygon points='135,85 175,95 165,125 150,125' fill='%231c2533' stroke='%23314057' stroke-width='0.5'/><polygon points='165,75 190,95 185,100 175,95' fill='%230a0d14' stroke='%23141b26' stroke-width='0.5'/></svg>" alt="Pantera Geométrica">
                    <p>Pantera Sigilosa</p>
                </div>

            </div>
        </div>

        <!-- 2. Los Botones de control -->
        <div id="panel-controles">
            <select id="selector-plantilla">
                <option value="ninguna">✨ Lienzo en Blanco</option>
                <option value="corazon">❤️ Plantilla: Corazón</option>
                <option value="diamante">💎 Plantilla: Diamante</option>
            </select>

            <button id="btn-color">🎨 Cambiar Paleta de Color</button>
            <button id="btn-exportar">📥 Comprar y Descargar Archivo</button>
        </div>
    </main>

    <!-- CONEXIÓN CON EL SCRIPT ÚNICO -->
    <script src="script.js"></script>
</body>
</html>
