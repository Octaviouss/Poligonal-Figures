<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poligonal Figures | Creador de Arte</title>
    <link rel="stylesheet" href="styles.css">  
</head>
<body>
    
    <!-- ENCABEZADO DE LA PÁGINA -->
    <header style="text-align: center; margin-bottom: 20px;">
        <h1>Poligonal Figures</h1>
        <p class="subtitulo">Crea, diseña e imprime tus figuras 3D y papel en segundos.</p>
    </header>

    <!-- ÁREA PRINCIPAL DE TRABAJO -->
    <main>
        <!-- 1. El Lienzo donde ocurrirá la magia -->
        <div id="area-dibujo" style="text-align: center; margin-bottom: 20px;">
            <canvas id="lienzo" width="600" height="400" style="border: 1px solid #1e293b; background-color: #0f172a; display: inline-block;"></canvas>
        </div>

        <!-- 3. GALERÍA DE DISEÑOS PRECARGADOS (Modelos de Lujo Estilo Etsy) -->
        <div id="seccion-catatogo" style="margin: 35px 0; text-align: center;">
            <h3 style="color: #64748b; font-family: 'Segoe UI', sans-serif; font-size: 0.85rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 25px;">
                📐 COLECCIÓN ESCULTURAS COMANCHET: ESTUDIO DE ARTE
            </h3>
            
            <div class="galeria-cuadricula" style="display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;">
                
                <!-- Modelo 1: Toro Feroz -->
                <div class="tarjeta-diseno" data-img="https://images.unsplash.com/photo-1551028719-00167b16eac5?w=600" style="border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; background: rgba(15, 23, 42, 0.4); cursor: pointer; text-align: center; width: 150px; transition: all 0.3s;">
                    <img src="https://images.unsplash.com/photo-1551028719-00167b16eac5?w=200" alt="Toro Low Poly" style="width: 100%; border-radius: 6px; height: 110px; object-fit: cover; filter: grayscale(1) brightness(0.7);">
                    <p style="color: #94a3b8; margin: 10px 0 0 0; font-size: 0.8rem; font-family: inherit; font-weight: 500; letter-spacing: 1px; text-transform: uppercase;">Toro de Wall Street</p>
                </div>

                <!-- Modelo 2: Elefante Imperial -->
                <div class="tarjeta-diseno" data-img="https://images.unsplash.com/photo-1605721911519-3dfeb3be25e7?w=600" style="border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; background: rgba(15, 23, 42, 0.4); cursor: pointer; text-align: center; width: 150px; transition: all 0.3s;">
                    <img src="https://images.unsplash.com/photo-1605721911519-3dfeb3be25e7?w=200" alt="Elefante Low Poly" style="width: 100%; border-radius: 6px; height: 110px; object-fit: cover; filter: grayscale(1) brightness(0.7);">
                    <p style="color: #94a3b8; margin: 10px 0 0 0; font-size: 0.8rem; font-family: inherit; font-weight: 500; letter-spacing: 1px; text-transform: uppercase;">Elefante Imperial</p>
                </div>

                <!-- Modelo 3: Rinoceronte Acorazado -->
                <div class="tarjeta-diseno" data-img="https://images.unsplash.com/photo-1507608869274-d3177c8bb4c7?w=600" style="border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; background: rgba(15, 23, 42, 0.4); cursor: pointer; text-align: center; width: 150px; transition: all 0.3s;">
                    <img src="https://images.unsplash.com/photo-1507608869274-d3177c8bb4c7?w=200" alt="Rinoceronte Low Poly" style="width: 100%; border-radius: 6px; height: 110px; object-fit: cover; filter: grayscale(1) brightness(0.6);">
                    <p style="color: #94a3b8; margin: 10px 0 0 0; font-size: 0.8rem; font-family: inherit; font-weight: 500; letter-spacing: 1px; text-transform: uppercase;">Rinoceronte Negro</p>
                </div>

                <!-- Modelo 4: Pantera Sigilosa -->
                <div class="tarjeta-diseno" data-img="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=600" style="border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; background: rgba(15, 23, 42, 0.4); cursor: pointer; text-align: center; width: 150px; transition: all 0.3s;">
                    <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=200" alt="Pantera Low Poly" style="width: 100%; border-radius: 6px; height: 110px; object-fit: cover; filter: grayscale(1) brightness(0.6);">
                    <p style="color: #94a3b8; margin: 10px 0 0 0; font-size: 0.8rem; font-family: inherit; font-weight: 500; letter-spacing: 1px; text-transform: uppercase;">Pantera Sigilosa</p>
                </div>

            </div>
        </div>

        <!-- 2. Los Botones de control (Un solo set único) -->
        <div id="panel-controles" style="text-align: center; margin-top: 20px;">
            <select id="selector-plantilla">
                <option value="ninguna">✨ Lienzo en Blanco</option>
                <option value="corazon">❤️ Plantilla: Corazón</option>
                <option value="diamante">💎 Plantilla: Diamante</option>
            </select>

            <button id="btn-color">🎨 Cambiar Paleta de Color</button>
            <button id="btn-exportar">📥 Comprar y Descargar Archivo</button>
        </div>
    </main>

    <!-- CONEXIÓN CON EL SCRIPT ÚNICO -->
    <script src="script.js"></script>
</body>
</html>
