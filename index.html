<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poligonal Figures | Creador de Arte</title>
    
    <style>
        /* ==========================================
           ESTILOS PREMIUM: ESTUDIO DE POLÍGONOS 3D
           ========================================== */

        /* 1. Base del Sitio (Estilo Galería de Lujo) */
        body {
            background-color: #090d16; /* Negro azulado profundo */
            color: #f1f5f9;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Encabezados elegantes y estilizados */
        h1, h2, h3 {
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
        }

        h1 {
            color: #ffffff;
            font-size: 2.2rem;
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        p.subtitulo {
            color: #64748b;
            font-size: 0.95rem;
            margin-top: 0;
            margin-bottom: 30px;
            text-align: center;
        }

        /* 2. Área de Trabajo Principal */
        main {
            max-width: 900px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        /* Contenedor del Lienzo con sombra de estudio */
        #area-dibujo {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            border: 1px solid #1e293b;
            background: #0f172a;
        }

        canvas#lienzo {
            display: block;
            cursor: crosshair;
            transition: opacity 0.3s ease;
        }

        /* 3. Catálogo de Siluetas Interactivas (Estilo Tienda de Arte) */
        #seccion-catatogo {
            width: 100%;
        }

        #seccion-catatogo h3 {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 15px;
        }

        .galeria-cuadricula {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Tarjetas de Producto estilo Glassmorphism */
        .tarjeta-diseno {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 12px;
            width: 160px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        .tarjeta-diseno:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            background: rgba(30, 41, 59, 0.7);
        }

        .tarjeta-diseno img {
            width: 100%;
            height: 110px;
            object-fit: cover;
            border-radius: 8px;
            filter: brightness(0.9);
            transition: filter 0.3s ease;
        }

        .tarjeta-diseno:hover img {
            filter: brightness(1.1);
        }

        .tarjeta-diseno p {
            color: #cbd5e1;
            margin: 10px 0 0 0;
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        /* 4. Panel de Controles e Inputs */
        #panel-controles {
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            width: 100%;
            margin-top: 10px;
        }

        /* Contenedor estilizado para el input file */
        .input-subir-personalizado {
            position: relative;
            display: inline-block;
        }

        .input-subir-personalizado input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .btn-subir-estilo {
            background-color: #1e293b;
            color: #ffffff;
            border: 1px solid #334155;
            display: inline-block;
        }

        .btn-subir-estilo:hover {
            background-color: #334155;
            border-color: #475569;
        }

        /* Controles deslizantes (Sliders) */
        .control-slider {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(15, 23, 42, 0.6);
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #1e293b;
            font-size: 0.85rem;
            color: #cbd5e1;
        }

        .control-slider input[type="range"] {
            cursor: pointer;
            accent-color: #a38965;
        }

        /* Botonera de Acción de Alta Gama */
        button {
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Botón Descargar: El Call to Action de Compra */
        #btn-exportar {
            background: linear-gradient(135deg, #8a7355 0%, #5c4d38 100%); /* Bronce / Carbón Premium */
            color: #ffffff;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        /* Estado: Pasar el mouse */
        #btn-exportar:hover {
            transform: scale(1.02);
            background: linear-gradient(135deg, #a38965 0%, #6e5b43 100%);
            box-shadow: 0 6px 25px rgba(138, 115, 85, 0.2);
        }

        /* Estado: Hacer clic */
        #btn-exportar:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    
    <!-- ENCABEZADO DE LA PÁGINA -->
    <header>
        <h1>Poligonal Figures</h1>
        <p class="subtitulo">Crea, diseña e imprime tus figuras 3D y papel en segundos.</p>
    </header>

    <!-- ÁREA PRINCIPAL DE TRABAJO -->
    <main>
        <!-- 1. El Lienzo donde ocurrirá la magia -->
        <div id="area-dibujo">
            <canvas id="lienzo" width="600" height="400"></canvas>
        </div>

        <!-- 2. PANEL DE CONTROLES (Integrado y Ampliado) -->
        <div id="panel-controles">
            <!-- Botón estilizado para subir foto propia -->
            <div class="input-subir-personalizado">
                <button class="btn-subir-estilo">📷 Subir mi propia imagen</button>
                <input type="file" id="subir-imagen" accept="image/*">
            </div>

            <!-- Slider interactivo para controlar la densidad de polígonos -->
            <div class="control-slider">
                <label for="slider-puntos">Densidad:</label>
                <input type="range" id="slider-puntos" min="300" max="3000" step="100" value="1200">
                <span id="valor-puntos">1200 pts</span>
            </div>

            <!-- Botón Exportar / Guardar resultado -->
            <button id="btn-exportar">Descargar PNG</button>
        </div>

        <!-- 3. GALERÍA DE DISEÑOS PRECARGADOS -->
        <div id="seccion-catatogo">
            <h3>📐 COLECCIÓN ESCULTURAS COMANCHET: ESTUDIO DE ARTE</h3>
            
            <div class="galeria-cuadricula">
                <!-- Tarjeta Demo Gato Low Poly (Usando una muestra genérica basada en tu idea) -->
                <div class="tarjeta-diseno" id="tarjeta-gato">
                    <img src="https://unsplash.com" alt="Gato">
                    <p>Gato de Estudio</p>
                </div>
            </div>
        </div>
    </main>

    <!-- ==========================================
       LÓGICA JAVASCRIPT: MOTOR LOW POLY CON DELAUNAY
       ========================================== -->
    <!-- Cargamos D3-Delaunay: librería matemática ultrarrápida para computar mallas poligonales -->
    <script src="https://cloudflare.com"></script>
    <script>
        const canvas = document.getElementById('lienzo');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const inputSubir = document.getElementById('subir-imagen');
        const sliderPuntos = document.getElementById('slider-puntos');
        const valorPuntos = document.getElementById('valor-puntos');
        const btnExportar = document.getElementById('btn-exportar');
        const tarjetaGato = document.getElementById('tarjeta-gato');

        let imagenOriginal = null;

        // 1. Inicializar el canvas con un mensaje artístico elegante
        ctx.fillStyle = "#0f172a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#64748b";
        ctx.font = "16px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("Sube una foto o selecciona una tarjeta para iniciar", canvas.width / 2, canvas.height / 2);

        // 2. Escuchar la carga de imágenes propias
        inputSubir.addEventListener('change', function(e) {
            const archivo = e.target.files[0];
            if (!archivo) return;

Usa el código con precaución.const lector = new FileReader();lector.onload = function(evento) {imagenOriginal = new Image();imagenOriginal.crossOrigin = "anonymous";imagenOriginal.onload = function() {redimensionarYProcesar();};imagenOriginal.src = evento.target.result;};lector.readAsDataURL(archivo);});// 3. Control dinámico de densidad con el slidersliderPuntos.addEventListener('input', function() {valorPuntos.textContent = ${this.value} pts;if (imagenOriginal) {generarLowPoly();}});// 4. Hacer clic en la tarjeta demo del gatotarjetaGato.addEventListener('click', function() {imagenOriginal = new Image();imagenOriginal.crossOrigin = "anonymous";imagenOriginal.onload = function() {redimensionarYProcesar();};// Cargamos una imagen pública y libre de un felino para la pruebaimagenOriginal.src = "unsplash.com";});// 5. Botón de exportación inmediata a formato PNG de alta fidelidadbtnExportar.addEventListener('click', function() {if (!imagenOriginal) {alert("Por favor, procesa una imagen primero antes de exportar.");return;}const enlace = document.createElement('a');enlace.download = 'poligonal-art.png';enlace.href = canvas.toDataURL('image/png');enlace.click();});// Ajusta el lienzo de forma fluida respetando las proporciones de la fotografía originalfunction redimensionarYProcesar() {const maxAncho = 600;const proporcion = imagenOriginal.height / imagenOriginal.width;canvas.width = maxAncho;canvas.height = maxAncho * proporcion;generarLowPoly();}// El motor core: distribuye vértices y triangula usando lógica de Delaunayfunction generarLowPoly() {const ancho = canvas.width;const alto = canvas.height;const numeroPuntos = parseInt(sliderPuntos.value);// Creamos un canvas temporal en memoria para poder leer rápidamente los colores originalesconst canvasOculto = document.createElement('canvas');canvasOculto.width = ancho;canvasOculto.height = alto;const ctxOculto = canvasOculto.getContext('2d');ctxOculto.drawImage(imagenOriginal, 0, 0, ancho, alto);const datosImagen = ctxOculto.getImageData(0, 0, ancho, alto);// Estructura de vérticesconst puntos = [];// Forzar las 4 esquinas exactas del lienzo para evitar fugas o fondos vacíospuntos.push([0, 0], [ancho, 0], [0, alto], [ancho, alto]);// Generamos una distribución uniforme aleatoria por todo el plano geométricofor (let i = 0; i < numeroPuntos; i++) {puntos.push([Math.random() * ancho, Math.random() * alto]);}// Calculamos la red de mallas usando la librería D3const delaunay = d3.Delaunay.from(puntos);const poligonos = delaunay.trianglePolygons();ctx.clearRect(0, 0, ancho, alto);// Iteramos sobre cada triángulo calculado, promediamos su color y lo plasmamosfor (const triangulo of poligonos) {ctx.beginPath();ctx.moveTo(triangulo[0][0], triangulo[0][1]);ctx.lineTo(triangulo[1][0], triangulo[1][1]);ctx.lineTo(triangulo[2][0], triangulo[2][1]);ctx.closePath();// Ubicamos el baricentro o punto medio del triángulo para extraer su tonalidad exactaconst centroX = Math.floor((triangulo[0][0] + triangulo[1][0] + triangulo[2][0]) / 3);const centroY = Math.floor((triangulo[0][1] + triangulo[1][1] + triangulo[2][1]) / 3);// Mapeo del buffer binario RGBA de la imagen originalconst indice = (centroY * ancho + centroX) * 4;const r = datosImagen.data[indice];const g = datosImagen.data[indice + 1];const b = datosImagen.data[indice + 2];// Rellenar área plana del polígonoctx.fillStyle = rgb(${r || 0}, ${g || 0}, ${b || 0});ctx.fill();// Truco técnico antipíxel: repintamos bordes con trazado ultra fino idéntico para evitar grietas visualesctx.strokeStyle = ctx.fillStyle;ctx.lineWidth = 0.6;ctx.stroke();}}
