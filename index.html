<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poligonal Figures | Creador de Arte</title>
    <link rel="stylesheet" href="styles.css">  
</head>
<body>
    
    <!-- ENCABEZADO DE LA PÁGINA -->
    <header style="text-align: center; margin-bottom: 20px;">
        <h1>Poligonal Figures</h1>
        <p class="subtitulo">Crea, diseña e imprime tus figuras 3D y papel en segundos.</p>
    </header>

    <!-- ÁREA PRINCIPAL DE TRABAJO -->
    <main>
        <!-- 1. El Lienzo donde ocurrirá la magia -->
        <div id="area-dibujo" style="text-align: center; margin-bottom: 20px;">
            <canvas id="lienzo" width="600" height="400" style="border: 1px solid #1e293b; background-color: #0f172a; display: inline-block;"></canvas>
        </div>

        <!-- 3. GALERÍA DE DISEÑOS PRECARGADOS (Modelos de Lujo Estilo Etsy) -->
        <div id="seccion-catatogo" style="margin: 35px 0; text-align: center;">
            <h3 style="color: #64748b; font-family: 'Segoe UI', sans-serif; font-size: 0.85rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 25px;">
                📐 COLECCIÓN ESCULTURAS COMANCHET: ESTUDIO DE ARTE
            </h3>
            
            <div class="galeria-cuadricula" style="display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;">
                
                <!-- Modelo 1: Toro de Wall Street -->
                <div class="tarjeta-diseno" data-img="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 150' style='background:%230f172a;'><polygon points='30,65 55,45 75,65 50,85' fill='%231e293b' stroke='%23334155'/><polygon points='55,45 95,40 120,65 75,65' fill='%232d3748' stroke='%234a5568'/><polygon points='75,65 120,65 105,105 65,100' fill='%231a202c' stroke='%232d3748'/><polygon points='120,65 160,55 175,75 140,95' fill='%232d3748' stroke='%234a5568'/><polygon points='120,65 140,95 105,105' fill='%231a202c' stroke='%232d3748'/><polygon points='55,45 45,25 35,35' fill='%234a5568' stroke='%23718096'/><polygon points='95,40 105,20 115,30' fill='%234a5568' stroke='%23718096'/></svg>" style="border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; background: rgba(15, 23, 42, 0.4); cursor: pointer; text-align: center; width: 150px; transition: all 0.3s;">
                    <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 150' style='background:%231e293b; border-radius:6px;'><polygon points='30,65 55,45 75,65 50,85' fill='%232d3748' stroke='%234a5568'/><polygon points='55,45 95,40 120,65 75,65' fill='%234a5568' stroke='%23718096'/><polygon points='75,65 120,65 105,105 65,100' fill='%231a202c' stroke='%232d3748'/><polygon points='120,65 160,55 175,75 140,95' fill='%234a5568' stroke='%23718096'/><polygon points='55,45 45,25 35,35' fill='%23718096' stroke='%23a0aec0'/><polygon points='95,40 105,20 115,30' fill='%23718096' stroke='%23a0aec0'/></svg>" alt="Toro Geométrico" style="width: 100%; border-radius: 6px; height: 110px; object-fit: cover;">
                    <p style="color: #94a3b8; margin: 10px 0 0 0; font-size: 0.8rem; font-family: inherit; font-weight: 500; letter-spacing: 1px; text-transform: uppercase;">Toro de Wall Street</p>
                </div>

                <!-- Modelo 2: Elefante Imperial -->
                <div class="tarjeta-diseno" data-img="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 150' style='background:%230f172a;'><polygon points='40,50 80,45 95,85 50,90' fill='%232d3748' stroke='%234a5568'/><polygon points='80,45 130,40 150,80 95,85' fill='%231a202c' stroke='%232d3748'/><polygon points='40,50 25,35 15,45 30,65' fill='%234a5568' stroke='%23718096'/><polygon points='30,65 20,95 35,115 45,85' fill='%231e293b' stroke='%23334155'/><polygon points='130,40 175,45 165,85 150,80' fill='%232d3748' stroke='%234a5568'/></svg>" style="border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; background: rgba(15, 23, 42, 0.4); cursor: pointer; text-align: center; width: 150px; transition: all 0.3s;">
                    <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 150' style='background:%231e293b; border-radius:6px;'><polygon points='40,50 80,45 95,85 50,90' fill='%234a5568' stroke='%23718096'/><polygon points='80,45 130,40 150,80 95,85' fill='%232d3748' stroke='%234a5568'/><polygon points='40,50 25,35 15,45 30,65' fill='%23718096' stroke='%23a0aec0'/><polygon points='30,65 20,95 35,115 45,85' fill='%23334155' stroke='%23475569'/></svg>" alt="Elefante Geométrico" style="width: 100%; border-radius: 6px; height: 110px; object-fit: cover;">
                    <p style="color: #94a3b8; margin: 10px 0 0 0; font-size: 0.8rem; font-family: inherit; font-weight: 500; letter-spacing: 1px; text-transform: uppercase;">Elefante Imperial</p>
                </div>

                <!-- Modelo 3: Rinoceronte Negro -->
                <div class="tarjeta-diseno" data-img="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 150' style='background:%230f172a;'><polygon points='40,80 75,55 105,75 70,105' fill='%231a202c' stroke='%232d3748'/><polygon points='75,55 135,50 160,80 105,75' fill='%232d3748' stroke='%234a5568'/><polygon points='40,80 25,75 15,65 35,60' fill='%234a5568' stroke='%23718096'/><polygon points='35,60 30,40 45,55' fill='%23718096' stroke='%23a0aec0'/><polygon points='135,50 175,70 160,80' fill='%231e293b' stroke='%23334155'/></svg>" style="border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; background: rgba(15, 23, 42, 0.4); cursor: pointer; text-align: center; width: 150px; transition: all 0.3s;">
                    <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 150' style='background:%231e293b; border-radius:6px;'><polygon points='40,80 75,55 105,75 70,105' fill='%232d3748' stroke='%234a5568'/><polygon points='75,55 135,50 160,80 105,75' fill='%234a5568' stroke='%23718096'/><polygon points='40,80 25,75 15,65 35,60' fill='%23718096' stroke='%23a0aec0'/><polygon points='35,60 30,40 45,55' fill='%23a0aec0' stroke='%23e2e8f0'/></svg>" alt="Rinoceronte Geométrico" style="width: 100%; border-radius: 6px; height: 110px; object-fit: cover;">
                    <p style="color: #94a3b8; margin: 10px 0 0 0; font-size: 0.8rem; font-family: inherit; font-weight: 500; letter-spacing: 1px; text-transform: uppercase;">Rinoceronte Negro</p>
                </div>

                <!-- Modelo 4: Pantera Sigilosa -->
                <div class="tarjeta-diseno" data-img="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 150' style='background:%230f172a;'><polygon points='35,70 65,55 100,70 70,95' fill='%231a202c' stroke='%232d3748'/><polygon points='65,55 145,50 175,70 100,70' fill='%232d3748' stroke='%234a5568'/><polygon points='145,50 185,55 175,70' fill='%231e293b' stroke='%23334155'/><polygon points='35,70 20,65 30,55' fill='%234a5568' stroke='%23718096'/></svg>" style="border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; background: rgba(15, 23, 42, 0.4); cursor: pointer; text-align: center; width: 150px; transition: all 0.3s;">
                    <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 150' style='background:%231e293b; border-radius:6px;'><polygon points='35,70 65,55 100,70 70,95' fill='%232d3748' stroke='%234a5568'/><polygon points='65,55 145,50 175,70 100,70' fill='%234a5568' stroke='%23718096'/><polygon points='35,70 20,65 30,55' fill='%23718096' stroke='%23a0aec0'/></svg>" alt="Pantera Geométrica" style="width: 100%; border-radius: 6px; height: 110px; object-fit: cover;">
                    <p style="color: #94a3b8; margin: 10px 0 0 0; font-size: 0.8rem; font-family: inherit; font-weight: 500; letter-spacing: 1px; text-transform: uppercase;">Pantera Sigilosa</p>
                </div>

            </div>
        </div>

        <!-- 2. Los Botones de control (Un solo set único) -->
        <div id="panel-controles" style="text-align: center; margin-top: 20px;">
            <select id="selector-plantilla">
                <option value="ninguna">✨ Lienzo en Blanco</option>
                <option value="corazon">❤️ Plantilla: Corazón</option>
                <option value="diamante">💎 Plantilla: Diamante</option>
            </select>

            <button id="btn-color">🎨 Cambiar Paleta de Color</button>
            <button id="btn-exportar">📥 Comprar y Descargar Archivo</button>
        </div>
    </main>

    <!-- CONEXIÓN CON EL SCRIPT ÚNICO -->
    <script src="script.js"></script>
</body>
</html>
